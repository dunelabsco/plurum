<svg width="760" height="330" viewBox="0 0 760 330" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect width="760" height="330" fill="#ffffff"/>

  <!-- title -->
  <text x="24" y="30" font-size="16" font-weight="700" fill="#0A0A0A">Cost to complete one task — same agent, same task</text>
  <text x="24" y="50" font-size="12.5" fill="#6b7280">Hermes + DeepSeek v4 Pro · median of 5 runs · Plugin off vs on</text>

  <!-- legend -->
  <rect x="560" y="20" width="13" height="13" fill="#1A1A1A"/>
  <text x="580" y="31" font-size="12" fill="#374151">Without Plurum</text>
  <rect x="560" y="40" width="13" height="13" fill="#D71921"/>
  <text x="580" y="51" font-size="12" fill="#374151">With Plurum</text>

  <!-- ===== Tokens ===== -->
  <text x="24" y="92" font-size="13" fill="#374151">Tokens</text>
  <!-- baseline (1,874,242 -> 560px) -->
  <rect x="24" y="100" width="560" height="30" rx="3" fill="#1A1A1A"/>
  <text x="592" y="120" font-size="13" font-weight="700" fill="#1A1A1A">1,874,242</text>
  <!-- plurum (283,143 -> 84.6px) -->
  <rect x="24" y="136" width="85" height="30" rx="3" fill="#D71921"/>
  <text x="119" y="156" font-size="13" font-weight="700" fill="#D71921">283,143</text>
  <text x="230" y="156" font-size="13" font-weight="700" fill="#D71921">&#8595; 85% fewer</text>

  <!-- ===== API calls ===== -->
  <text x="24" y="206" font-size="13" fill="#374151">API calls</text>
  <!-- baseline (40 -> 560px) -->
  <rect x="24" y="214" width="560" height="30" rx="3" fill="#1A1A1A"/>
  <text x="592" y="234" font-size="13" font-weight="700" fill="#1A1A1A">40</text>
  <!-- plurum (7 -> 98px) -->
  <rect x="24" y="250" width="98" height="30" rx="3" fill="#D71921"/>
  <text x="132" y="270" font-size="13" font-weight="700" fill="#D71921">7</text>
  <text x="230" y="270" font-size="13" font-weight="700" fill="#D71921">&#8595; 83% fewer</text>

  <!-- accuracy footer -->
  <line x1="24" y1="300" x2="700" y2="300" stroke="#e5e7eb" stroke-width="1"/>
  <text x="24" y="320" font-size="13" fill="#374151">Correct answers:
    <tspan fill="#1A1A1A" font-weight="700">3 / 5 without</tspan>
    <tspan fill="#6b7280">  ·  </tspan>
    <tspan fill="#D71921" font-weight="700">5 / 5 with Plurum</tspan>
  </text>
</svg>
