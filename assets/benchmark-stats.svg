<svg width="720" height="150" viewBox="0 0 720 150" xmlns="http://www.w3.org/2000/svg" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <rect width="720" height="150" fill="#ffffff"/>

  <!-- dividers -->
  <line x1="240" y1="28" x2="240" y2="104" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="480" y1="28" x2="480" y2="104" stroke="#e5e7eb" stroke-width="1"/>

  <!-- col 1 -->
  <text x="120" y="74" font-size="52" font-weight="800" fill="#D71921" text-anchor="middle">85%</text>
  <text x="120" y="100" font-size="15" fill="#374151" text-anchor="middle">fewer tokens</text>

  <!-- col 2 -->
  <text x="360" y="74" font-size="52" font-weight="800" fill="#D71921" text-anchor="middle">83%</text>
  <text x="360" y="100" font-size="15" fill="#374151" text-anchor="middle">fewer API calls</text>

  <!-- col 3 -->
  <text x="600" y="74" font-size="52" font-weight="800" fill="#D71921" text-anchor="middle">100%</text>
  <text x="600" y="100" font-size="15" fill="#374151" text-anchor="middle">correct <tspan fill="#9ca3af">(vs 60%)</tspan></text>

  <!-- caption -->
  <text x="360" y="134" font-size="11.5" fill="#9ca3af" text-anchor="middle">median of 5 runs · same agent, same task · with Plurum vs without</text>
</svg>
