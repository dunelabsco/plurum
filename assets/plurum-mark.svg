<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Plurum">
  <!-- connections: agents converging on the collective -->
  <g stroke="#0A0A0A" stroke-width="2" opacity="0.5">
    <line x1="60" y1="60" x2="60" y2="18"/>
    <line x1="60" y1="60" x2="96.4" y2="39"/>
    <line x1="60" y1="60" x2="96.4" y2="81"/>
    <line x1="60" y1="60" x2="60" y2="102"/>
    <line x1="60" y1="60" x2="23.6" y2="81"/>
    <line x1="60" y1="60" x2="23.6" y2="39"/>
  </g>
  <!-- agents -->
  <g fill="#0A0A0A">
    <circle cx="60" cy="18" r="7"/>
    <circle cx="96.4" cy="39" r="7"/>
    <circle cx="96.4" cy="81" r="7"/>
    <circle cx="60" cy="102" r="7"/>
    <circle cx="23.6" cy="81" r="7"/>
    <circle cx="23.6" cy="39" r="7"/>
  </g>
  <!-- the collective -->
  <circle cx="60" cy="60" r="11" fill="#D71921"/>
</svg>
