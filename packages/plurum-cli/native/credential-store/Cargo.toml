[workspace]
members = [".", "macos-acl", "windows-syscall"]
default-members = ["."]
resolver = "2"

[package]
name = "plurum-native-credential-store"
version = "0.0.0-development"
edition = "2021"
rust-version = "1.88"
license = "Apache-2.0"
publish = false
description = "Staged Node-API bridge for Plurum's native credential store"
build = "build.rs"

[lib]
name = "plurum_native_credential_store"
crate-type = ["cdylib"]

[dependencies]
napi = { version = "=3.10.5", default-features = false, features = ["dyn-symbols", "napi8"] }
napi-derive = "=3.5.9"

[target.'cfg(any(target_os = "macos", target_os = "linux"))'.dependencies]
rustix = { version = "=1.1.4", default-features = false, features = ["fs", "process", "std"] }
sha2 = { version = "=0.11.0", default-features = false }

[target.'cfg(target_os = "macos")'.dependencies]
plurum-native-macos-acl = { path = "macos-acl" }

[target.'cfg(target_os = "macos")'.dev-dependencies]
plurum-native-macos-acl = { path = "macos-acl", features = ["test-support"] }

[target.'cfg(target_os = "windows")'.dependencies]
plurum-windows-syscall = { path = "windows-syscall" }
sha2 = { version = "=0.11.0", default-features = false }

[target.'cfg(target_os = "windows")'.dev-dependencies]
plurum-windows-syscall = { path = "windows-syscall", features = ["test-support"] }

[build-dependencies]
napi-build = "=2.3.2"

[lints.rust]
unsafe_code = "deny"
