name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: backend tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_DB_URL: postgresql://localhost/test
      SUPABASE_KEY: test-key
      OPENAI_API_KEY: test-key
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Lint
        run: poetry run ruff check app tests
      - name: Run backend and Hermes plugin tests
        run: poetry run pytest tests plugins/hermes/tests -q
      - name: Build production image
        run: docker build --tag plurum-ci .

  web:
    name: web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  openclaw:
    name: openclaw plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/openclaw
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugins/openclaw/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify tracked dist
        run: git diff --exit-code -- dist
