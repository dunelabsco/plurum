name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: backend tests
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_DB_URL: postgresql://localhost/test
      SUPABASE_KEY: test-key
      OPENAI_API_KEY: test-key
      ENVIRONMENT: development
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - name: Install Poetry
        run: pipx install poetry
      - name: Install dependencies
        run: poetry install --no-interaction --no-root
      - name: Lint
        run: poetry run ruff check app tests
      - name: Run backend and Hermes plugin tests
        run: poetry run pytest tests plugins/hermes/tests -q
      - name: Build production image
        run: docker build --tag plurum-ci .

  web:
    name: web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build

  openclaw:
    name: openclaw plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: plugins/openclaw
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: plugins/openclaw/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Verify tracked dist
        run: git diff --exit-code -- dist

  plurum-cli:
    name: plurum cli (${{ matrix.os }}, node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: "22"
          - os: macos-latest
            node: "22"
          - os: windows-latest
            node: "22"
          - os: ubuntu-latest
            node: "24"
    defaults:
      run:
        working-directory: packages/plurum-cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: packages/plurum-cli/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck, test, build, and verify package
        run: npm run check
