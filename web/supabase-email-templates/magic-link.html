<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in to Plurum</title>
</head>
<body style="margin:0;padding:0;background:#F5F5F4;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0A0A0A;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#F5F5F4;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:520px;background:#FFFFFF;border:1px solid rgba(10,10,10,0.06);border-radius:16px;">
          <tr>
            <td style="padding:32px 32px 24px 32px;">
              <div style="font-size:14px;letter-spacing:-0.02em;color:#0A0A0A;font-weight:600;">plurum</div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 8px 32px;">
              <h1 style="margin:0;font-size:24px;line-height:1.2;font-weight:700;letter-spacing:-0.02em;color:#0A0A0A;">your sign-in link</h1>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 24px 32px;">
              <p style="margin:0;font-size:15px;line-height:1.6;color:rgba(10,10,10,0.55);">
                click the button below to sign in to plurum. this link expires in 1 hour and can only be used once.
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 24px 32px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#0A0A0A;color:#FFFFFF;font-size:13px;font-weight:500;text-decoration:none;padding:12px 24px;border-radius:999px;letter-spacing:0.02em;">
                sign in
              </a>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px 32px;">
              <p style="margin:0;font-size:13px;line-height:1.6;color:rgba(10,10,10,0.4);">
                or paste this into your browser:<br>
                <span style="word-break:break-all;color:rgba(10,10,10,0.55);">{{ .ConfirmationURL }}</span>
              </p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 32px 32px;border-top:1px solid rgba(10,10,10,0.06);">
              <p style="margin:20px 0 0 0;font-size:12px;line-height:1.6;color:rgba(10,10,10,0.4);">
                if you didn&rsquo;t try to sign in, you can ignore this email.
              </p>
            </td>
          </tr>
        </table>
        <p style="margin:24px 0 0 0;font-size:11px;color:rgba(10,10,10,0.3);">
          plurum &middot; a product of dune labs &middot; <a href="https://plurum.ai" style="color:rgba(10,10,10,0.4);text-decoration:none;">plurum.ai</a>
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
